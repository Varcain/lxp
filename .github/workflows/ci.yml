#
# Continuously verify what this module promises: it stays decoupled from oveRTOS, its
# core passes host unit tests, every feature gate compiles independently (no gate-rot),
# and it runs end-to-end on Cortex-M QEMU.
name: ci

on:
  push:
  pull_request:

jobs:
  host:
    name: decouple guard + host cmocka
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decoupling guard (src/ + include/ must stay oveRTOS-free)
        run: sh scripts/check-decoupled.sh

      - name: Configure (fetches cmocka)
        run: cmake -S . -B build -DLXP_BUILD_TESTS=ON

      # Build only the test binary (-Werror). Skips liblxp, whose 32-bit-target casts
      # warn on a 64-bit host — the module is not meant to run natively there.
      - name: Build host tests (-Wall -Wextra -Werror)
        run: cmake --build build -j"$(nproc)" --target lxp_test_stub

      - name: Run host unit tests
        run: ctest --test-dir build -R lxp_unit --output-on-failure

  sanitizers:
    name: ASan + UBSan (host cmocka)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure with ASan+UBSan (fetches cmocka)
        run: cmake -S . -B build -DLXP_BUILD_TESTS=ON -DLXP_SANITIZE=ON

      - name: Build host tests (ASan+UBSan)
        run: cmake --build build -j"$(nproc)" --target lxp_test_stub

      # OOB reads/writes and signed/unsigned overflow are hard errors here
      # (-fno-sanitize-recover=all). Leak detection is off: the target is the 32-bit
      # overflow / OOB bug class, and the static test pools trip LSan false positives.
      - name: Run under ASan+UBSan
        run: ASAN_OPTIONS=detect_leaks=0 ctest --test-dir build -R lxp_unit --output-on-failure

  gates:
    # Gate-rot guard: cross-compile every src/ TU for Cortex-M under each LXP_ENABLE_*
    # config, -Werror. A clean build proves the #if LXP_ENABLE_X gating holds in both
    # directions — an unguarded reference to a disabled subsystem fails here, and each
    # =0 config compiling clean proves the feature genuinely drops out (value-based, D3).
    name: gate-rot matrix (${{ matrix.gates.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gates:
          - { name: minimal,  defs: "" }
          - { name: net,      defs: "-DLXP_ENABLE_NET=1" }
          - { name: netfs,    defs: "-DLXP_ENABLE_NET=1 -DLXP_ENABLE_NETFS=1 -DLXP_ENABLE_NETFS_EXEC=1" }
          - { name: pty,      defs: "-DLXP_ENABLE_PTY=1" }
          - { name: dev,      defs: "-DLXP_ENABLE_DEV=1" }
          - { name: dev-full, defs: "-DLXP_ENABLE_DEV=1 -DLXP_ENABLE_DEV_FB=1 -DLXP_ENABLE_DEV_INPUT=1" }
          - { name: all,      defs: "-DLXP_ENABLE_NET=1 -DLXP_ENABLE_NETFS=1 -DLXP_ENABLE_NETFS_EXEC=1 -DLXP_ENABLE_PTY=1 -DLXP_ENABLE_DEV=1 -DLXP_ENABLE_DEV_FB=1 -DLXP_ENABLE_DEV_INPUT=1" }
    steps:
      - uses: actions/checkout@v4

      - name: Install arm-none-eabi toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Compile all src/ for Cortex-M under these gates (-Werror)
        run: ARMCC=arm-none-eabi-gcc sh scripts/gate-build.sh ${{ matrix.gates.defs }}

  qemu:
    name: QEMU mps2-an500 end-to-end (M1/M2/M3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arm-none-eabi toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm xxd

      - name: Vendor FreeRTOS (fetch-deps)
        run: cd ports/qemu-mps2 && bash fetch-deps.sh

      # The pinned cpio fixtures are committed, so no Buildroot FDPIC toolchain is
      # needed: M1/M2 embed guest/rootfs.cpio, M3 XIPs guest/rootfs_m3.cpio from PSRAM.
      - name: M1 — static-FDPIC hello
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=1 bash run.sh
      - name: M2 — vfork/execve/wait4/pipe
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=2 bash run.sh
      - name: M3 — dynamic-FDPIC busybox (unprivileged + MPU)
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=3 bash run.sh

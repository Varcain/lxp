#
# Continuously verify what this module promises: it stays decoupled from oveRTOS, its
# core passes host unit tests, every feature gate compiles independently (no gate-rot),
# and it runs end-to-end on Cortex-M QEMU.
name: ci

on:
  push:
  pull_request:

jobs:
  host:
    name: decouple guard + host cmocka
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decoupling guard (src/ + include/ must stay oveRTOS-free)
        run: sh scripts/check-decoupled.sh

      - name: Syscall coverage guard (LXP_NR_* vs ARM EABI reference)
        run: sh scripts/syscalls/check-syscalls.sh

      - name: Configure (fetches cmocka)
        run: cmake -S . -B build -DLXP_BUILD_TESTS=ON

      # Build the test binaries (-Werror). Skips liblxp, whose 32-bit-target casts warn
      # on a 64-bit host — the module is not meant to run natively there. lxp_coord_test
      # (the coordinator suite) is built without -Werror since src/lxp_run.c warns there.
      - name: Build host tests (-Wall -Wextra -Werror)
        run: cmake --build build -j"$(nproc)" --target lxp_test_stub lxp_coord_test

      - name: Run host unit tests
        run: ctest --test-dir build -R lxp_unit --output-on-failure

  sanitizers:
    name: ASan + UBSan (host cmocka)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure with ASan+UBSan (fetches cmocka)
        run: cmake -S . -B build -DLXP_BUILD_TESTS=ON -DLXP_SANITIZE=ON

      - name: Build host tests (ASan+UBSan)
        run: cmake --build build -j"$(nproc)" --target lxp_test_stub lxp_coord_test

      # OOB reads/writes and signed/unsigned overflow are hard errors here
      # (-fno-sanitize-recover=all). Leak detection is off: the target is the 32-bit
      # overflow / OOB bug class, and the static test pools trip LSan false positives.
      - name: Run under ASan+UBSan
        run: ASAN_OPTIONS=detect_leaks=0 ctest --test-dir build -R lxp_unit --output-on-failure

  fuzz:
    # Corpus-regression for the untrusted-input parsers (FDPIC/ET_REL loaders, cpio, path,
    # 9P reply, syscall). Replays the committed seed corpora — including a regression seed
    # for every bug the fuzzer has found — through each harness once under ASan/UBSan. This
    # is gcc-only (the `replay` engine); no fuzzing engine is needed, so CI stays clang-free.
    # Live coverage-guided runs (libFuzzer locally / AFL++) are documented in fuzz/README.md.
    name: fuzz corpus regression (ASan + UBSan replay)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure fuzz harnesses (replay engine, gcc + ASan/UBSan)
        run: cmake -S . -B build -DLXP_BUILD_FUZZ=ON -DLXP_FUZZ_ENGINE=replay -DLXP_SANITIZE=ON

      - name: Build the fuzz harnesses
        run: >
          cmake --build build -j"$(nproc)"
          --target fuzz_fdpic fuzz_etrel fuzz_cpio fuzz_path fuzz_9p fuzz_syscall

      - name: Replay the seed corpora under ASan+UBSan
        run: ASAN_OPTIONS=detect_leaks=0 ctest --test-dir build -R _corpus --output-on-failure

  gates:
    # Gate-rot guard: cross-compile every src/ TU for Cortex-M under each LXP_ENABLE_*
    # config, -Werror. A clean build proves the #if LXP_ENABLE_X gating holds in both
    # directions — an unguarded reference to a disabled subsystem fails here, and each
    # =0 config compiling clean proves the feature genuinely drops out (value-based, D3).
    name: gate-rot matrix (${{ matrix.gates.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gates:
          - { name: minimal,  defs: "" }
          - { name: net,      defs: "-DLXP_ENABLE_NET=1" }
          - { name: netfs,    defs: "-DLXP_ENABLE_NET=1 -DLXP_ENABLE_NETFS=1 -DLXP_ENABLE_NETFS_EXEC=1" }
          - { name: pty,      defs: "-DLXP_ENABLE_PTY=1" }
          - { name: dev,      defs: "-DLXP_ENABLE_DEV=1" }
          - { name: dev-full, defs: "-DLXP_ENABLE_DEV=1 -DLXP_ENABLE_DEV_FB=1 -DLXP_ENABLE_DEV_INPUT=1" }
          - { name: all,      defs: "-DLXP_ENABLE_NET=1 -DLXP_ENABLE_NETFS=1 -DLXP_ENABLE_NETFS_EXEC=1 -DLXP_ENABLE_PTY=1 -DLXP_ENABLE_DEV=1 -DLXP_ENABLE_DEV_FB=1 -DLXP_ENABLE_DEV_INPUT=1" }
    steps:
      - uses: actions/checkout@v4

      # Cache the toolchain .debs so the 7 matrix legs (and re-runs) install from disk instead
      # of re-downloading gcc-arm-none-eabi each time. Shared key across the matrix.
      - name: Cache arm-none-eabi packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-arm-none-eabi-${{ runner.os }}

      - name: Install arm-none-eabi toolchain
        run: |
          mkdir -p ~/apt-cache
          sudo apt-get update
          sudo apt-get install -y -o Dir::Cache::archives="$HOME/apt-cache" gcc-arm-none-eabi
          sudo rm -rf ~/apt-cache/partial ~/apt-cache/lock
          sudo chown -R "$(id -u):$(id -g)" ~/apt-cache

      - name: Compile all src/ for Cortex-M under these gates (-Werror)
        run: ARMCC=arm-none-eabi-gcc sh scripts/gate-build.sh ${{ matrix.gates.defs }}

  qemu:
    name: QEMU mps2-an500 end-to-end (M1..M6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache arm-none-eabi + QEMU packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-qemu-${{ runner.os }}

      - name: Install arm-none-eabi toolchain + QEMU
        run: |
          mkdir -p ~/apt-cache
          sudo apt-get update
          sudo apt-get install -y -o Dir::Cache::archives="$HOME/apt-cache" \
            gcc-arm-none-eabi qemu-system-arm xxd
          sudo rm -rf ~/apt-cache/partial ~/apt-cache/lock
          sudo chown -R "$(id -u):$(id -g)" ~/apt-cache

      # fetch-deps.sh shallow-clones FreeRTOS-Kernel (pinned) and no-ops if it is already
      # present, so caching vendor/ skips the clone on every subsequent run.
      - name: Cache FreeRTOS-Kernel (vendored, pinned)
        uses: actions/cache@v4
        with:
          path: ports/qemu-mps2/vendor
          key: freertos-${{ hashFiles('ports/qemu-mps2/fetch-deps.sh') }}

      - name: Vendor FreeRTOS (fetch-deps)
        run: cd ports/qemu-mps2 && bash fetch-deps.sh

      # The pinned cpio fixtures are committed, so no Buildroot FDPIC toolchain is
      # needed: M1/M2 embed guest/rootfs.cpio, M3 XIPs guest/rootfs_m3.cpio from PSRAM.
      - name: M1 — static-FDPIC hello
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=1 bash run.sh
      - name: M2 — vfork/execve/wait4/pipe
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=2 bash run.sh
      - name: M3 — dynamic-FDPIC busybox (unprivileged + MPU)
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=3 bash run.sh
      - name: M4 — syscall conformance (dispatch/resume ABI, r0 width, statx/svc6, fork/kill/wait4)
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=4 bash run.sh
      - name: M5 — real futex (two CLONE_VM threads: FUTEX_WAIT parks, FUTEX_WAKE resumes)
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=5 bash run.sh
      - name: M6 — busybox /bin/sh smoke (unmodified shell sees the port-supplied environment)
        run: cd ports/qemu-mps2 && ARMCC=arm-none-eabi-gcc QEMU=qemu-system-arm M=6 bash run.sh
